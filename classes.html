<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLASSES | ANTHONY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-white text-zinc-900 dark:bg-[#121212] dark:text-[#eeeeee]">

    <nav class="p-6 flex justify-between items-center border-b border-zinc-200 dark:border-white/10">
        <a href="index.html" class="text-xl font-bold tracking-tighter">ANTHONY<span class="text-[#FF5F1F]">.</span></a>
        <a href="index.html" class="text-xs font-bold uppercase tracking-widest hover:text-[#FF5F1F]">← Back Home</a>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-20">
        <h2 class="text-4xl font-bold mb-12 italic border-l-4 border-[#FF5F1F] pl-6 uppercase">Workshops</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="p-8 rounded-xl bg-zinc-50 dark:bg-[#1A1A1A] border border-zinc-200 dark:border-white/5">
                <div class="flex justify-between items-start mb-6">
                    <span class="bg-green-500 text-white text-[10px] px-2 py-1 font-bold rounded">BEGINNER</span>
                    <span class="text-2xl font-bold">$150</span>
                </div>
                <h3 class="text-3xl mb-4 italic">MIG Fundamentals</h3>
                <p class="text-gray-600 dark:text-gray-400 mb-8">4-hour intensive focusing on safety, machine setup, and pulling your first beads.</p>
                <button class="w-full bg-[#FF5F1F] text-black font-bold py-4 rounded uppercase tracking-widest hover:brightness-110">Reserve My Spot</button>
            </div>

            <div class="p-8 rounded-xl bg-zinc-50 dark:bg-[#1A1A1A] border border-zinc-200 dark:border-white/5">
                <div class="flex justify-between items-start mb-6">
                    <span class="bg-red-500 text-white text-[10px] px-2 py-1 font-bold rounded">ADVANCED</span>
                    <span class="text-2xl font-bold">$325</span>
                </div>
                <h3 class="text-3xl mb-4 italic">TIG Precision</h3>
                <p class="text-gray-600 dark:text-gray-400 mb-8">Advanced heat control for aluminum and stainless steel fabrication.</p>
                <button class="w-full bg-[#FF5F1F] text-black font-bold py-4 rounded uppercase tracking-widest hover:brightness-110">Reserve My Spot</button>
            </div>
        </div>
    </main>
</body>
</html>
