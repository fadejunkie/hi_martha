<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | ANTHONY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-white text-zinc-900 dark:bg-[#121212] dark:text-[#eeeeee]">

    <nav class="p-6 flex justify-between items-center border-b border-zinc-200 dark:border-white/10">
        <a href="index.html" class="text-xl font-bold tracking-tighter">ANTHONY<span class="text-[#FF5F1F]">.</span></a>
        <a href="index.html" class="text-xs font-bold uppercase tracking-widest hover:text-[#FF5F1F]">← Back Home</a>
    </nav>

    <header class="py-16 text-center bg-zinc-50 dark:bg-[#0D0D0D]">
        <h1 class="text-5xl font-bold">THE GEAR DROP</h1>
        <p class="text-gray-500 uppercase tracking-[0.3em] text-xs">Forged for the Grind</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-3 gap-12">
        <div class="group cursor-pointer">
            <div class="relative aspect-[4/5] bg-zinc-100 dark:bg-[#1A1A1A] flex items-center justify-center overflow-hidden border border-zinc-200 dark:border-white/5">
                <span class="text-gray-400 uppercase font-bold text-[10px] tracking-widest">Heavy Metal Tee</span>
                <div class="absolute bottom-0 w-full bg-[#FF5F1F] text-black text-center py-3 font-bold translate-y-full group-hover:translate-y-0 transition">QUICK ADD</div>
            </div>
            <div class="mt-4 flex justify-between">
                <h3 class="text-lg">Stacking Dimes Tee</h3>
                <span class="text-[#FF5F1F] font-bold">$38</span>
            </div>
        </div>
        </main>
</body>
</html>
