<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop Collections | Arquero Co</title>
  <meta name="description" content="Browse Arquero Co collections: Apparel, Headwear, Work Gear, and Limited Drops. Built for welders and the blue-collar grind." />
  <link rel="canonical" href="/shop.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="site-header"><div class="container nav-wrap"><a href="index.html" class="brand"><span class="brand-mark"></span><span class="brand-text">Arquero <span>Co</span></span></a><nav class="nav-links" data-nav-links><a href="index.html">Home</a><a href="shop.html">Shop</a><a href="arquero-fest.html">Arquero Fest</a><a href="about.html">Our Story</a><a href="contact.html">Contact</a></nav><div class="nav-actions"><button class="menu-btn" data-menu-btn>☰</button><button class="icon-btn" data-open-cart>🛒 <span data-cart-count>0</span></button></div></div></header>

<main class="container section">
  <div class="breadcrumbs"><span><a href="index.html">Home</a></span><span>Shop</span></div>
  <p class="kicker">Collections</p>
  <h1 class="section-title">Shop all gear</h1>
  <p class="lead">Core Apparel: tees ($35–45), hoodies ($55–75), snapbacks ($35–40). Work-Ready gear and limited heritage pieces included.</p>

  <section class="filters" aria-label="Shop filtering and sorting">
    <div class="filters-row">
      <label>Category
        <select id="filter-category">
          <option>All</option>
          <option>Apparel</option>
          <option>Headwear</option>
          <option>Work Gear</option>
          <option>Limited Drops</option>
        </select>
      </label>
      <label>Sort
        <select id="filter-sort">
          <option>Featured</option>
          <option>Price: Low to High</option>
          <option>Price: High to Low</option>
          <option>Newest</option>
        </select>
      </label>
    </div>
  </section>

  <div class="grid products-grid" data-shop-grid></div>
</main>

<footer class="site-footer"><div class="container">Built for welders, fitters, and creators.</div></footer>

<button class="btn btn-primary cart-float" data-open-cart>Cart (<span data-cart-count>0</span>)</button>
<aside class="cart-drawer" data-cart-drawer><div class="cart-head"><strong>Your Cart</strong> <button class="icon-btn" data-close-cart>Close</button></div><div class="cart-items" data-cart-items></div><div class="cart-foot"><div class="cart-total"><span>Total</span><span data-cart-total>$0.00</span></div><button class="btn btn-primary" style="width:100%">Checkout</button></div></aside>
<script src="script.js"></script>
</body>
</html>
